<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — TLAPS Operations</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="../images/favicon.ico">
<link rel="apple-touch-icon" href="../images/apple-touch-icon.png">
<link rel="stylesheet" href="assets/portal.css">
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-brand">
      <img src="../images/tlaps_logo.png" alt="TLAPS">
      <h1>TLAPS Operations</h1>
      <div class="sub">Internal Portal</div>
    </div>
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Sign In</button>
      <div class="form-error" id="error"></div>
    </form>
  </div>
</div>

<script src="assets/portal.js"></script>
<script>
  // If already authed, skip straight to dashboard
  if (isAuthenticated()) {
    window.location.replace('dashboard.html');
  }

  const form = document.getElementById('loginForm');
  const errEl = document.getElementById('error');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errEl.textContent = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) {
      errEl.textContent = 'Email and password are required.';
      return;
    }
    if (login(email, password)) {
      window.location.href = 'dashboard.html';
    } else {
      errEl.textContent = 'Invalid credentials. Please try again.';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  });
</script>
</body>
</html>
