<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — TLAPS Operations</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="../images/favicon.ico">
<link rel="stylesheet" href="assets/portal.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  .filters { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 14px; }
  .chip-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .chip { padding: 4px 12px; border: 1px solid var(--border); border-radius: 14px; background: var(--bg-card); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-muted); user-select: none; }
  .chip:hover { border-color: var(--green); color: var(--green); }
  .chip.active { background: var(--green); border-color: var(--green); color: #fff; }
  .vfam-badge { display: inline-block; padding: 1px 6px; border-radius: 9px; font-size: 9px; font-weight: 700; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; font-family: 'SF Mono', Consolas, monospace; }
  .vval-badge { display: inline-block; padding: 1px 6px; border-radius: 9px; font-size: 9px; font-weight: 600; background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe; }
  .role-badge { display: inline-block; padding: 1px 5px; border-radius: 9px; font-size: 9px; font-weight: 700; }
  .role-parent { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
  .role-child  { background: #f0f9ff; color: #075985; border: 1px solid #bae6fd; }
  .role-solo   { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  .filters .field { display: flex; flex-direction: column; gap: 3px; }
  .filters label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .filters input, .filters select { padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font: inherit; background: var(--bg-card); }
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .stat .label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
  .stat .value { font-size: 22px; font-weight: 700; color: var(--green); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .ml-badge { display: inline-block; padding: 1px 6px; border-radius: 9px; font-size: 10px; font-weight: 600; }
  .b-live      { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
  .b-draft     { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  .b-nis       { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  .b-other     { background: #e0e7ff; color: #3730a3; border: 1px solid #c7d2fe; }
  .pct-bar { display: inline-block; width: 80px; height: 10px; background: #e5e7eb; border-radius: 5px; overflow: hidden; vertical-align: middle; margin-right: 6px; }
  .pct-bar > div { height: 100%; background: var(--green); transition: width 0.2s; }
  .pct-bar.red    > div { background: #b91c1c; }
  .pct-bar.yellow > div { background: #a16207; }
  .pct-bar.green  > div { background: #15803d; }
  .pct-bar.grey   > div { background: #9ca3af; }
  .ck-row { font-family: monospace; font-size: 11px; letter-spacing: 1px; color: var(--text-muted); white-space: nowrap; }
  .ck-y { color: #15803d; font-weight: 700; }
  .ck-n { color: #d1d5db; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: var(--green-dark); }
  th .sort-arrow { display: inline-block; width: 12px; opacity: 0.45; font-size: 10px; }
  th.sort-asc  .sort-arrow::after  { content: '▲'; opacity: 1; }
  th.sort-desc .sort-arrow::after  { content: '▼'; opacity: 1; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .row-count { font-size: 12px; color: var(--text-muted); margin: 6px 0; }
  tbody tr { cursor: default; }
</style>
</head>
<body>
<div class="portal-layout">
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="main-header">
      <div>
        <h1>Products</h1>
        <div class="subtitle">All SKUs in tlaps-prod &middot; filter, sort, search &middot; export to CSV/XLSX &middot; inline edit</div>
      </div>
      <div class="row-actions">
        <button class="btn btn-ghost" id="btn-refresh">Refresh</button>
        <button class="btn btn-secondary" id="btn-export-csv">Export CSV</button>
        <button class="btn btn-secondary" id="btn-export-xlsx">Export XLSX</button>
      </div>
    </div>

    <section class="section">
      <div class="stats" id="stats"></div>
    </section>

    <section class="section">
      <div class="card">
        <div class="chip-row" id="chip-row">
          <button class="chip active" data-role="">All</button>
          <button class="chip" data-role="parent">Families only (parents)</button>
          <button class="chip" data-role="child">Children only</button>
          <button class="chip" data-role="solo">Standalone only</button>
        </div>
        <div class="filters">
          <div class="field"><label>Search (sku/asin/title)</label><input type="search" id="f-search" placeholder="e.g. TLAPS, B0915, plates"></div>
          <div class="field"><label>Brand</label><select id="f-brand"><option value="">All</option></select></div>
          <div class="field"><label>Status</label><select id="f-status"><option value="">All</option></select></div>
          <div class="field"><label>Category</label><select id="f-cat"><option value="">All</option></select></div>
          <div class="field"><label>Completion</label>
            <select id="f-comp">
              <option value="">All</option>
              <option value="100">100% complete</option>
              <option value="67">67-99%</option>
              <option value="33">33-66%</option>
              <option value="1">1-32%</option>
              <option value="0">0% untouched</option>
            </select>
          </div>
          <div class="field"><button class="btn btn-ghost" id="btn-clear-filters" style="padding:6px 12px">Clear</button></div>
        </div>
        <div class="row-count" id="row-count">Loading&hellip;</div>
        <div style="max-height:65vh; overflow:auto; border:1px solid var(--border); border-radius:4px">
          <table class="data-table compact" id="tbl" style="margin:0">
            <thead>
              <tr>
                <th class="sortable" data-col="tlaps_sku">I3 SKU <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="dhg_sku">DHG SKU <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="asin">ASIN <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="family_id">Family <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="variation_value">Variant <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="brand">Brand <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="category">Category <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="status">Status <span class="sort-arrow"></span></th>
                <th class="sortable text-right" data-col="map_price">MAP <span class="sort-arrow"></span></th>
                <th class="sortable text-right" data-col="vc_cost">VC Cost <span class="sort-arrow"></span></th>
                <th class="sortable text-right" data-col="margin_pct_vc">Margin% <span class="sort-arrow"></span></th>
                <th class="sortable" data-col="completion_pct">Completion <span class="sort-arrow"></span></th>
                <th>Checklist</th>
              </tr>
            </thead>
            <tbody id="tbody"><tr><td colspan="13" class="muted" style="padding:30px;text-align:center">Loading rows from tlaps-prod&hellip;</td></tr></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="assets/portal.js"></script>
<script>
  requireAuth();
  renderSidebar('products');

  const state = { all: [], filtered: [], sortCol: 'completion_pct', sortDir: 'desc', role: '' };

  document.querySelectorAll('.chip-row .chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.chip-row .chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      state.role = c.dataset.role || '';
      applyFilters();
    });
  });

  document.getElementById('btn-refresh').addEventListener('click', () => load());
  document.getElementById('btn-export-csv').addEventListener('click', () => exportCSV());
  document.getElementById('btn-export-xlsx').addEventListener('click', () => exportXLSX());
  document.getElementById('btn-clear-filters').addEventListener('click', () => clearFilters());

  ['f-search','f-brand','f-status','f-cat','f-comp'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => applyFilters());
  });
  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (state.sortCol === col) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      else { state.sortCol = col; state.sortDir = 'asc'; }
      applyFilters();
    });
  });

  load();

  async function load() {
    try {
      // v_sku_completion already joins products + listings + asset_status
      const rows = await sbGet('v_sku_completion?select=*&limit=2000');
      // Also pull variation columns from products (not yet in the view).
      let varRows = [];
      try {
        varRows = await sbGet('products?select=tlaps_sku,family_id,is_parent,parent_tlaps_sku,variation_theme,variation_value&limit=2000');
      } catch (ve) { console.warn('variation columns fetch failed:', ve.message); }
      const varMap = new Map(varRows.map(v => [v.tlaps_sku, v]));
      state.all = rows.map(r => Object.assign({}, r, varMap.get(r.tlaps_sku) || {}));
      buildFilterOptions();
      applyFilters();
    } catch (e) {
      console.error(e);
      toast('Failed to load: ' + e.message, 'error');
      document.getElementById('tbody').innerHTML =
        '<tr><td colspan="13" style="color:var(--error);text-align:center;padding:30px">Load failed. Check console.</td></tr>';
    }
  }

  function buildFilterOptions() {
    const fillSelect = (id, vals) => {
      const sel = document.getElementById(id);
      const cur = sel.value;
      sel.innerHTML = '<option value="">All</option>' + vals.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
      sel.value = cur;
    };
    const uniq = (key) => [...new Set(state.all.map(r => r[key]).filter(Boolean))].sort();
    fillSelect('f-brand', uniq('brand'));
    fillSelect('f-status', uniq('status'));
    fillSelect('f-cat', uniq('category'));
  }

  function clearFilters() {
    ['f-search','f-brand','f-status','f-cat','f-comp'].forEach(id => document.getElementById(id).value = '');
    applyFilters();
  }

  function applyFilters() {
    const q  = document.getElementById('f-search').value.trim().toLowerCase();
    const fb = document.getElementById('f-brand').value;
    const fs = document.getElementById('f-status').value;
    const fc = document.getElementById('f-cat').value;
    const fp = document.getElementById('f-comp').value;

    let rows = state.all.filter(r => {
      if (q) {
        const hay = [r.tlaps_sku, r.dhg_sku, r.asin, r.gen_title, r.family_id, r.variation_value].filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      // Role chip filter
      if (state.role === 'parent') { if (!r.is_parent) return false; }
      else if (state.role === 'child')  { if (r.is_parent || !r.parent_tlaps_sku) return false; }
      else if (state.role === 'solo')   { if (r.family_id) return false; }
      if (fb && r.brand !== fb) return false;
      if (fs && r.status !== fs) return false;
      if (fc && r.category !== fc) return false;
      if (fp !== '') {
        const p = Number(r.completion_pct || 0);
        const fpn = Number(fp);
        if (fpn === 100 && p !== 100) return false;
        if (fpn === 67  && (p < 67  || p >= 100)) return false;
        if (fpn === 33  && (p < 33  || p >= 67))  return false;
        if (fpn === 1   && (p < 1   || p >= 33))  return false;
        if (fpn === 0   && p !== 0) return false;
      }
      return true;
    });

    rows.sort((a, b) => {
      const va = a[state.sortCol], vb = b[state.sortCol];
      const na = (va == null) ? -Infinity : (typeof va === 'number' ? va : String(va).toLowerCase());
      const nb = (vb == null) ? -Infinity : (typeof vb === 'number' ? vb : String(vb).toLowerCase());
      const cmp = na < nb ? -1 : na > nb ? 1 : 0;
      return state.sortDir === 'asc' ? cmp : -cmp;
    });

    state.filtered = rows;
    render();
    renderStats();
    updateSortArrows();
  }

  function updateSortArrows() {
    document.querySelectorAll('th.sortable').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      if (th.dataset.col === state.sortCol) th.classList.add('sort-' + state.sortDir);
    });
  }

  function roleBadge(r) {
    if (r.is_parent) return '<span class="role-badge role-parent">parent</span>';
    if (r.parent_tlaps_sku) return '<span class="role-badge role-child">child</span>';
    return '';
  }
  function brandBadge(b) {
    if (!b) return '';
    const k = b === 'TLAPS' ? 'b-live' : b === 'DHG' ? 'b-draft' : 'b-other';
    return `<span class="ml-badge ${k}">${escapeHtml(b)}</span>`;
  }
  function statusBadge(s) {
    if (!s) return '';
    const k = s === 'live' ? 'b-live' : s === 'nis_pending' ? 'b-nis' : 'b-draft';
    return `<span class="ml-badge ${k}">${escapeHtml(s)}</span>`;
  }
  function pctClass(p) {
    if (p == null) return 'grey';
    if (p >= 100) return 'green';
    if (p >= 67)  return 'green';
    if (p >= 33)  return 'yellow';
    if (p > 0)    return 'red';
    return 'grey';
  }
  function ckRow(r) {
    const tf = (b) => `<span class="${b ? 'ck-y' : 'ck-n'}">${b ? '☑' : '☐'}</span>`;
    return `<span class="ck-row" title="basic / comp / life / video / A+ / reviews&ge;10">${tf(r.c1_basic_listing)} ${tf(r.c2_comparison_image)} ${tf(r.c3_lifestyle_image)} ${tf(r.c4_video)} ${tf(r.c5_aplus)} ${tf(r.c6_reviews_min10)}</span>`;
  }
  function fmt$(v) { return v == null ? '—' : '$' + Number(v).toFixed(2); }
  function fmtPct(v) { return v == null ? '—' : Number(v).toFixed(1) + '%'; }

  function render() {
    const tbody = document.getElementById('tbody');
    document.getElementById('row-count').textContent = state.filtered.length + ' of ' + state.all.length + ' rows';
    if (!state.filtered.length) {
      tbody.innerHTML = '<tr><td colspan="13" class="muted" style="padding:30px;text-align:center">No rows match the current filters.</td></tr>';
      return;
    }
    tbody.innerHTML = state.filtered.map(r => {
      const p = Number(r.completion_pct || 0);
      const cls = pctClass(p);
      return ''
        + '<tr>'
        +   '<td class="mono">' + escapeHtml(r.tlaps_sku || '') + ' ' + roleBadge(r) + '</td>'
        +   '<td class="mono tiny">' + escapeHtml(r.dhg_sku || '') + '</td>'
        +   '<td class="mono tiny">' + escapeHtml(r.asin || '') + '</td>'
        +   '<td>' + (r.family_id ? '<span class="vfam-badge">' + escapeHtml(r.family_id) + '</span>' : '<span class="muted tiny">—</span>') + '</td>'
        +   '<td>' + (r.variation_value ? '<span class="vval-badge">' + escapeHtml(r.variation_value) + '</span>' : '<span class="muted tiny">—</span>') + '</td>'
        +   '<td>' + brandBadge(r.brand) + '</td>'
        +   '<td class="tiny">' + escapeHtml(r.category || '—') + '</td>'
        +   '<td>' + statusBadge(r.status) + '</td>'
        +   '<td class="mono text-right">' + fmt$(r.map_price) + '</td>'
        +   '<td class="mono text-right">' + fmt$(r.vc_cost) + '</td>'
        +   '<td class="mono text-right">' + fmtPct(r.margin_pct_vc) + '</td>'
        +   '<td><span class="pct-bar ' + cls + '"><div style="width:' + p + '%"></div></span><span class="tiny">' + p.toFixed(0) + '%</span></td>'
        +   '<td>' + ckRow(r) + '</td>'
        + '</tr>';
    }).join('');
  }

  function renderStats() {
    const rows = state.filtered;
    const total = rows.length;
    const tlaps = rows.filter(r => (r.tlaps_sku || '').startsWith('TLAPS-')).length;
    const live = rows.filter(r => r.status === 'live').length;
    const complete = rows.filter(r => r.is_complete).length;
    const avgPct = rows.length ? (rows.reduce((s,r)=>s+Number(r.completion_pct||0),0) / rows.length) : 0;
    const html = ''
      + '<div class="stat"><div class="label">SKUs (filtered)</div><div class="value">' + total + '</div></div>'
      + '<div class="stat"><div class="label">TLAPS-prefixed</div><div class="value">' + tlaps + '</div></div>'
      + '<div class="stat"><div class="label">Live</div><div class="value">' + live + '</div></div>'
      + '<div class="stat"><div class="label">100% complete</div><div class="value">' + complete + '</div></div>'
      + '<div class="stat"><div class="label">Avg completion</div><div class="value">' + avgPct.toFixed(1) + '%</div></div>';
    document.getElementById('stats').innerHTML = html;
  }

  function exportCSV() {
    const cols = ['tlaps_sku','dhg_sku','asin','family_id','is_parent','parent_tlaps_sku','variation_theme','variation_value','brand','category','status','map_price','vc_cost','i3_cost','margin_pct_vc','completion_pct','criteria_met','c1_basic_listing','c2_comparison_image','c3_lifestyle_image','c4_video','c5_aplus','c6_reviews_min10','live_review_count','gen_title'];
    const escape = (v) => {
      if (v == null) return '';
      const s = String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const lines = [cols.join(',')];
    state.filtered.forEach(r => lines.push(cols.map(c => escape(r[c])).join(',')));
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tlaps-products-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    toast('CSV exported (' + state.filtered.length + ' rows)', 'success');
  }

  function exportXLSX() {
    const sheet = XLSX.utils.json_to_sheet(state.filtered);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, sheet, 'Products');
    XLSX.writeFile(wb, 'tlaps-products-' + new Date().toISOString().slice(0,10) + '.xlsx');
    toast('XLSX exported (' + state.filtered.length + ' rows)', 'success');
  }
</script>
</body>
</html>
