<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js"></script>
<title>Products — TLAPS Operations</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="../images/favicon.ico">
<link rel="stylesheet" href="assets/portal.css">
<style>
  .filters { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; margin-bottom:16px; }
  .filters .fld { display:flex; flex-direction:column; gap:4px; }
  .filters label { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); font-weight:600; }
  .filters input, .filters select { padding:8px 10px; border:1px solid var(--border); border-radius:5px; font-size:13px; background:var(--bg-card); }
  .filters input[type=search]{ min-width:280px; }
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
  .kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .kpi .label { font-size:10px; text-transform:uppercase; color:var(--text-muted); font-weight:600; }
  .kpi .value { font-size:24px; font-weight:700; color:var(--green); margin-top:3px; font-variant-numeric:tabular-nums; }
  table.ptbl { width:100%; border-collapse:collapse; font-size:12.5px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  table.ptbl th { text-align:left; padding:9px 10px; background:var(--green); color:#fff; font-size:11px; text-transform:uppercase; letter-spacing:.04em; cursor:pointer; white-space:nowrap; }
  table.ptbl th .arr { opacity:.6; font-size:9px; }
  table.ptbl td { padding:8px 10px; border-top:1px solid #f0f0ec; vertical-align:middle; }
  table.ptbl tr:hover td { background:#faf8f3; }
  .mono { font-family:'SF Mono',Consolas,monospace; font-size:11.5px; }
  .ttl { max-width:420px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pill { display:inline-block; padding:1px 8px; border-radius:10px; font-size:10px; font-weight:600; white-space:nowrap; }
  .pill-red{background:#fee2e2;color:#b91c1c}.pill-yellow{background:#fef3c7;color:#92400e}.pill-green{background:#dcfce7;color:#15803d}.pill-grey{background:#eee;color:#666}
  .cbar { width:70px; height:10px; background:#f0f0ec; border-radius:5px; overflow:hidden; display:inline-block; vertical-align:middle; }
  .cbar > div { height:100%; background:var(--green); }
  a.skulink { color:var(--green); text-decoration:none; font-weight:600; }
  a.skulink:hover { text-decoration:underline; }
  .muted { color:var(--text-muted); }
  .count-line { font-size:12px; color:var(--text-muted); margin:6px 0 12px; }
</style>
</head>
<body>
<div class="portal-layout">
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="main-header">
      <div>
        <h1>Products</h1>
        <div class="subtitle">Live from tlaps-prod &middot; v_sku_completion &middot; reload to refresh</div>
      </div>
      <div class="row-actions">
        <button class="btn btn-ghost" id="btn-refresh">Refresh</button>
        <a class="btn btn-secondary" href="dashboard.html">&larr; Dashboard</a>
        <a class="btn btn-secondary" href="variations.html">Variations &rarr;</a>
      </div>
    </div>

    <section class="section">
      <div class="kpi-grid" id="kpis"></div>
      <div class="filters">
        <div class="fld"><label>Search</label><input type="search" id="f-q" placeholder="SKU, ASIN, title, DHG SKU…"></div>
        <div class="fld"><label>Status</label><select id="f-status"><option value="">All</option></select></div>
        <div class="fld"><label>Category</label><select id="f-cat"><option value="">All</option></select></div>
        <div class="fld"><label>Completion</label><select id="f-comp"><option value="">Any</option><option value="100">100% complete</option><option value="lt100">Under 100%</option><option value="0">0% (nothing done)</option></select></div>
      </div>
      <div class="count-line" id="count-line">Loading&hellip;</div>
      <table class="ptbl" id="ptbl">
        <thead><tr>
          <th data-sort="tlaps_sku">SKU <span class="arr"></span></th>
          <th data-sort="gen_title">Title <span class="arr"></span></th>
          <th data-sort="category">Category <span class="arr"></span></th>
          <th data-sort="asin">ASIN <span class="arr"></span></th>
          <th data-sort="status">Status <span class="arr"></span></th>
          <th data-sort="map_price">MAP <span class="arr"></span></th>
          <th data-sort="margin_pct_vc">Margin <span class="arr"></span></th>
          <th data-sort="completion_pct">Complete <span class="arr"></span></th>
        </tr></thead>
        <tbody id="ptbody"><tr><td colspan="8" class="muted">Loading&hellip;</td></tr></tbody>
      </table>
    </section>
  </main>
</div>

<script src="assets/portal.js"></script>
<script>
  requireAuth();
  renderSidebar('products');

  let ROWS = [];
  let sortKey = 'completion_pct', sortDir = 1; // 1 asc, -1 desc

  document.getElementById('btn-refresh').addEventListener('click', load);
  ['f-q','f-status','f-cat','f-comp'].forEach(id =>
    document.getElementById(id).addEventListener('input', render));
  document.querySelectorAll('#ptbl th[data-sort]').forEach(th =>
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
      render();
    }));

  load();

  async function load() {
    try {
      const raw = await sbGet('v_sku_completion?select=*&limit=3000');
      ROWS = raw.filter(r => (r.tlaps_sku || '').startsWith('TLAPS-'));
      buildFilters(ROWS);
      renderKPIs(ROWS);
      render();
    } catch (e) {
      console.error(e);
      document.getElementById('ptbody').innerHTML = '<tr><td colspan="8" class="muted">Load failed: ' + escapeHtml(e.message) + '</td></tr>';
      toast('Load failed: ' + e.message, 'error');
    }
  }

  function buildFilters(rows) {
    const statuses = [...new Set(rows.map(r => r.status).filter(Boolean))].sort();
    const cats = [...new Set(rows.map(r => r.category).filter(Boolean))].sort();
    const ss = document.getElementById('f-status'), cc = document.getElementById('f-cat');
    if (ss.options.length <= 1) statuses.forEach(s => ss.add(new Option(s, s)));
    if (cc.options.length <= 1) cats.forEach(c => cc.add(new Option(c, c)));
  }

  function renderKPIs(rows) {
    const live = rows.filter(r => r.status === 'live').length;
    const draft = rows.filter(r => r.status === 'draft').length;
    const complete = rows.filter(r => r.is_complete).length;
    const noImg = rows.filter(r => !r.c2_comparison_image && !r.c3_lifestyle_image).length;
    document.getElementById('kpis').innerHTML =
      kpi('Total', rows.length) + kpi('Live', live) + kpi('Draft', draft) +
      kpi('100% complete', complete) + kpi('Needs images', noImg);
  }
  function kpi(l, v){ return '<div class="kpi"><div class="label">'+l+'</div><div class="value">'+v+'</div></div>'; }

  function render() {
    const q = document.getElementById('f-q').value.trim().toLowerCase();
    const st = document.getElementById('f-status').value;
    const cat = document.getElementById('f-cat').value;
    const comp = document.getElementById('f-comp').value;
    let list = ROWS.filter(r => {
      if (st && r.status !== st) return false;
      if (cat && r.category !== cat) return false;
      const cp = Number(r.completion_pct || 0);
      if (comp === '100' && cp !== 100) return false;
      if (comp === 'lt100' && cp >= 100) return false;
      if (comp === '0' && cp !== 0) return false;
      if (q) {
        const hay = [r.tlaps_sku, r.dhg_sku, r.asin, r.gen_title, r.category].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    list.sort((a, b) => {
      let x = a[sortKey], y = b[sortKey];
      const nx = Number(x), ny = Number(y);
      if (!isNaN(nx) && !isNaN(ny)) { x = nx; y = ny; }
      else { x = (x == null ? '' : String(x)).toLowerCase(); y = (y == null ? '' : String(y)).toLowerCase(); }
      return (x < y ? -1 : x > y ? 1 : 0) * sortDir;
    });
    document.getElementById('count-line').textContent =
      list.length + ' of ' + ROWS.length + ' SKUs';
    if (!list.length) { document.getElementById('ptbody').innerHTML = '<tr><td colspan="8" class="muted">No matches.</td></tr>'; return; }
    document.getElementById('ptbody').innerHTML = list.map(rowHtml).join('');
  }

  function statusPill(s) {
    const m = { live:'pill-green', nis_pending:'pill-yellow', draft:'pill-grey', archived:'pill-grey' };
    return '<span class="pill ' + (m[s] || 'pill-grey') + '">' + escapeHtml(s || '—') + '</span>';
  }
  function marginCell(m) {
    if (m == null) return '<span class="muted">—</span>';
    const v = Number(m); const cls = v < 40 ? 'pill-red' : v < 60 ? 'pill-yellow' : 'pill-green';
    return '<span class="pill ' + cls + '">' + v.toFixed(1) + '%</span>';
  }
  function compCell(p) {
    const v = Number(p || 0);
    return '<span class="cbar"><div style="width:' + v + '%"></div></span> <span class="mono">' + v.toFixed(0) + '%</span>';
  }
  function rowHtml(r) {
    const link = 'product-detail.html?sku=' + encodeURIComponent(r.tlaps_sku || '') + (r.asin ? '&asin=' + encodeURIComponent(r.asin) : '');
    return '<tr>'
      + '<td><a class="skulink mono" href="' + link + '">' + escapeHtml(r.tlaps_sku || '') + '</a></td>'
      + '<td class="ttl" title="' + escapeHtml(r.gen_title || '') + '">' + escapeHtml(r.gen_title || '—') + '</td>'
      + '<td>' + escapeHtml(r.category || '—') + '</td>'
      + '<td class="mono">' + escapeHtml(r.asin || '—') + '</td>'
      + '<td>' + statusPill(r.status) + '</td>'
      + '<td>' + (r.map_price != null ? '$' + Number(r.map_price).toFixed(2) : '—') + '</td>'
      + '<td>' + marginCell(r.margin_pct_vc) + '</td>'
      + '<td>' + compCell(r.completion_pct) + '</td>'
      + '</tr>';
  }
</script>
</body>
</html>
