const grid=document.getElementById('grid');
const cats=[...new Set(DATA.map(p=>p.category))].sort();
const csel=document.getElementById('cat');cats.forEach(c=>{let o=document.createElement('option');o.value=c;o.textContent=c;csel.appendChild(o)});
document.getElementById('s_total').textContent=DATA.length;
document.getElementById('s_live').textContent=DATA.filter(p=>p.status==='live').length;
document.getElementById('s_una').textContent=DATA.filter(p=>p.status==='unavailable').length;
function render(){
 let q=document.getElementById('q').value.toLowerCase();
 let c=csel.value, st=document.getElementById('st').value, sort=document.getElementById('sort').value;
 let rows=DATA.filter(p=>(!c||p.category===c)&&(!st||p.status===st)&&(!q||(p.title+p.sku+p.asin+p.upc).toLowerCase().includes(q)));
 if(sort==='price')rows.sort((a,b)=>(parseFloat(b.price)||0)-(parseFloat(a.price)||0));
 else if(sort==='title')rows.sort((a,b)=>a.title.localeCompare(b.title));
 else rows.sort((a,b)=>(a.category+a.sku).localeCompare(b.category+b.sku));
 grid.innerHTML=rows.map(p=>`<div class="card">
  <div class="imgwrap">${p.img?`<img loading="lazy" src="${p.img}">`:'<span class="noimg">no image</span>'}</div>
  <div class="body">
   <div class="badges"><span class="b cat">${p.category}</span>
    <span class="b ${p.status==='live'?'live':p.status==='unavailable'?'una':'unk'}">${p.status}</span>
    ${p.title_is_live?'':'<span class="b pend">title pending</span>'}</div>
   <div class="title">${p.title||'(no live title)'}</div>
   <div class="row"><span class="sku">${p.sku}</span><span class="price">${p.price?'$'+p.price:''}</span></div>
   <div class="row"><a class="asin" href="https://www.amazon.com/dp/${p.asin}" target="_blank">${p.asin} ↗</a><span>${p.upc||''}</span></div>
  </div></div>`).join('');
 document.getElementById('foot').textContent=`Showing ${rows.length} of ${DATA.length}. Live data scraped from Amazon. "title pending" = optimized title built but not yet uploaded to VC.`;
}
['q','cat','st','sort'].forEach(id=>document.getElementById(id).addEventListener('input',render));
render();
</script></body></html>
