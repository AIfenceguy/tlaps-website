<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail — TLAPS Operations</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="../images/favicon.ico">
<link rel="stylesheet" href="assets/portal.css">
</head>
<body>
<div class="portal-layout">
  <nav class="sidebar"></nav>

  <main class="main">
    <div class="main-header">
      <div>
        <h1 id="page-title">Product Detail</h1>
        <div class="subtitle"><a href="products.html">← All products</a></div>
      </div>
      <div class="muted" id="page-meta"></div>
    </div>

    <div id="nis-card" style="margin-bottom:18px"></div>
    <div id="content"><div class="card text-center muted">Loading product…</div></div>
  </main>
</div>

<script src="assets/portal.js"></script>
<script>
  // Image-fallback chain: walks through the data-fallbacks JSON list until one
  // loads or the list is exhausted, then swaps in a placeholder.
  function imgFallback(imgEl) {
    try {
      const raw = imgEl.getAttribute('data-fallbacks');
      const list = raw ? JSON.parse(raw) : [];
      if (!list.length) { imgPlaceholder(imgEl); return; }
      const next = list.shift();
      if (list.length) {
        imgEl.setAttribute('data-fallbacks', JSON.stringify(list));
      } else {
        imgEl.removeAttribute('data-fallbacks');
        imgEl.setAttribute('onerror', 'imgPlaceholder(this)');
      }
      imgEl.src = next;
    } catch (e) { imgPlaceholder(imgEl); }
  }
  function imgPlaceholder(imgEl) {
    imgEl.onerror = null;
    imgEl.removeAttribute('onerror');
    const parent = imgEl.parentElement;
    if (!parent) return;
    const ph = document.createElement('div');
    ph.style.cssText = 'display:flex;align-items:center;justify-content:center;background:#f3f4f6;color:#9ca3af;font-size:11px;height:' + (imgEl.height || 120) + 'px;width:100%';
    ph.textContent = imgEl.alt || 'no image';
    parent.replaceChild(ph, imgEl);
  }

  requireAuth();
  renderSidebar('products');

  const params = new URLSearchParams(location.search);
  const skuParam  = params.get('sku');
  const asinParam = params.get('asin');

  if (!skuParam && !asinParam) {
    document.getElementById('content').innerHTML =
      `<div class="card" style="color:var(--error)">No SKU or ASIN specified. <a href="products.html">Back to products</a>.</div>`;
  } else {
    // resolveAndLoad chooses sku-first lookup if provided, asin otherwise
    resolveAndLoadProduct(skuParam, asinParam);
  }

  // Resolve the product row from Supabase (so we always have tlaps_sku, dhg_sku,
  // asin, and dhg_reference_images for the image-folder probing logic).
  async function resolveAndLoadProduct(sku, asin) {
    try {
      let row = null;
      if (sku) {
        const rows = await sbGet('products?select=*&tlaps_sku=eq.' + encodeURIComponent(sku) + '&limit=1');
        row = rows && rows[0];
      }
      if (!row && asin) {
        const rows = await sbGet('products?select=*&asin=eq.' + encodeURIComponent(asin) + '&limit=1');
        row = rows && rows[0];
      }
      if (!row) {
        document.getElementById('content').innerHTML =
          `<div class="card" style="color:var(--error)">Product not found for ${sku ? 'SKU ' + escapeHtml(sku) : 'ASIN ' + escapeHtml(asin)}. <a href="products.html">Back to products</a>.</div>`;
        return;
      }
      // Render NIS card if we have an ASIN (the view is asin-keyed).
      if (row.asin) renderNisCard(row.asin);
      loadProductFromRow(row);
    } catch (e) {
      document.getElementById('content').innerHTML =
        `<div class="card" style="color:var(--error)">Failed to load: ${escapeHtml(e.message)}</div>`;
    }
  }

  // Inline NIS-readiness summary from Supabase (silent if view not applied yet).
  async function renderNisCard(asin) {
    try {
      const rows = await sbGet('v_nis_readiness?select=*&asin=eq.' + encodeURIComponent(asin));
      if (!rows || !rows.length) return;
      const r = rows[0];
      const m = v => (v == null || isNaN(v)) ? '—' : '$' + Number(v).toFixed(2);
      const net = r.net_to_i3_calc, i3 = r.i3_cost_calc;
      const margin = (net && net > 0 && i3 != null) ? ((net - i3) / net * 100).toFixed(1) + '%' : '—';
      const slots = ['MAIN','PT01','PT02','PT03','PT04','PT05'];
      const ss = r.slot_status || {};
      const filled = slots.filter(s => ss[s] && ss[s].filled).length;
      const ready = r.blocker === 'ready';
      const cell = (l, v) => `<div><div class="tiny muted">${l}</div><div class="mono">${v}</div></div>`;
      document.getElementById('nis-card').innerHTML =
        `<div class="card" style="border-left:4px solid ${ready ? '#15803d' : '#b45309'}">
           <div class="flex-between mb-12">
             <strong style="color:var(--green)">NIS Readiness</strong>
             <span class="badge ${ready ? 'badge-done' : 'badge-pending'}">${escapeHtml(r.blocker)}</span>
           </div>
           <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;font-size:13px">
             ${cell('UPC', r.upc ? escapeHtml(r.upc) : '<span style="color:#b91c1c">none</span>')}
             ${cell('i3 cost', m(i3))}
             ${cell('VC cost', m(r.vc_cost_calc))}
             ${cell('Net to I3', m(net))}
             ${cell('Margin', margin)}
             ${cell('Images', filled + '/6')}
             ${cell('Suggested list', m(r.suggested_list_price))}
           </div>
           <div class="tiny mt-12"><a href="nis-readiness.html">Open full NIS Readiness →</a></div>
         </div>`;
    } catch (e) { /* view not present yet -> stay silent */ }
  }

  // Build a product object from a Supabase products row. Also fetch the
  // listings row (if present) so we can populate the listing-content tab.
  async function loadProductFromRow(row) {
    try {
      // Pull listings content if present.
      let listing = {};
      try {
        const ls = await sbGet('listings?select=*&tlaps_sku=eq.' + encodeURIComponent(row.tlaps_sku) + '&limit=1');
        if (ls && ls[0]) {
          const L = ls[0];
          listing = {
            title:              L.gen_title || '',
            bullet_1:           L.gen_bullet_1 || '',
            bullet_2:           L.gen_bullet_2 || '',
            bullet_3:           L.gen_bullet_3 || '',
            bullet_4:           L.gen_bullet_4 || '',
            bullet_5:           L.gen_bullet_5 || '',
            backend_keywords:   L.gen_keywords || '',
            product_description: L.gen_description || ''
          };
        }
      } catch (e) { /* listings table may not be populated for this sku */ }

      // Build a shim product object compatible with the existing render() code.
      const p = {
        i3_sku:        row.tlaps_sku,
        tlaps_sku:     row.tlaps_sku,
        dhg_sku:       row.dhg_sku || '',
        asin:          row.asin || '',
        upc:           row.upc || '',
        vendor_code:   row.vendor_code || 'I3ENT',
        description:   listing.title || row.dhg_amazon_title || row.tlaps_sku,
        notes:         '',
        map_price:     row.map_price,
        amazon_selling_price: row.amz_selling_price,
        dhg_cost:      row.col_e,
        dhg_cost_confirmed: !!row.cost_confirmed,
        coop_rate:     0.22,
        listing:       listing,
        media:         buildMediaForRow(row),
        metrics:       {},
        status: {
          listing_live:           row.status === 'live',
          images_uploaded:        !!row.images_uploaded,
          title_optimized:        !!(listing.title && listing.title.length > 80),
          backend_keywords_done:  !!(listing.backend_keywords && listing.backend_keywords.length > 50)
        },
        _row: row
      };

      document.getElementById('page-title').textContent = p.description || p.tlaps_sku;
      document.getElementById('page-meta').innerHTML =
        `<span class="mono">${escapeHtml(p.tlaps_sku)}</span>`;

      render(p);
    } catch (e) {
      document.getElementById('content').innerHTML =
        `<div class="card" style="color:var(--error)">${escapeHtml(e.message)}</div>`;
    }
  }

  // Build the media block. Folder-name candidates (in order): tlaps_sku, asin, dhg_sku.
  // The img element uses an onerror chain to try each candidate folder for {ASIN}.{slot}.jpg.
  function buildMediaForRow(row) {
    return {
      main_image: null, // resolved at render time via candidate-folder probe
      gallery: [],
      _slot_candidates: buildSlotCandidates(row),
      _ref_images: Array.isArray(row.dhg_reference_images) ? row.dhg_reference_images : []
    };
  }
  function buildSlotCandidates(row) {
    const slots = ['MAIN','PT01','PT02','PT03','PT04','PT05','PT06','PT07','PT08'];
    // Folder-name candidates, in priority order. Filter empties + dedupe.
    const folderKeys = [row.tlaps_sku, row.asin, row.dhg_sku].filter(Boolean);
    const folderKeysUnique = [...new Set(folderKeys)];
    // The {ASIN} portion of the filename is whatever ASIN we have; if the SKU has no
    // ASIN we still try with tlaps_sku and dhg_sku as the filename prefix.
    const filePrefixCandidates = [row.asin, row.tlaps_sku, row.dhg_sku].filter(Boolean);
    const prefixesUnique = [...new Set(filePrefixCandidates)];
    const out = {};
    slots.forEach(slot => {
      const urls = [];
      folderKeysUnique.forEach(folder => {
        prefixesUnique.forEach(prefix => {
          urls.push('../listings/images/' + encodeURIComponent(folder) + '/' + encodeURIComponent(prefix) + '.' + slot + '.jpg');
        });
      });
      out[slot] = urls;
    });
    return out;
  }

  function render(p) {
    const c = computeCosts(p);
    const root = document.getElementById('content');

    const notesHtml = p.notes
      ? `<div class="notes-banner ${/urgent/i.test(p.notes) ? 'urgent' : ''}"><strong>Note:</strong> ${escapeHtml(p.notes)}</div>`
      : '';

    root.innerHTML = `
      <!-- Header -->
      <div class="product-header">
        <div class="ph-image">
          ${slotImgTag(p, 'MAIN', escapeHtml(p.description), 'width:100%;display:block')}
        </div>
        <div class="ph-info">
          <div class="ph-name">${escapeHtml(p.description)}</div>
          <div class="ph-meta">
            <div>I3 SKU: <strong>${escapeHtml(p.i3_sku)}</strong></div>
            <div>DHG SKU: <strong>${escapeHtml(p.dhg_sku)}</strong></div>
            <div>ASIN: <strong>${escapeHtml(p.asin)}</strong></div>
            <div>UPC: <strong>${escapeHtml(p.upc || '—')}</strong></div>
            <div>Vendor: <strong>${escapeHtml(p.vendor_code || 'I3ENT')}</strong></div>
          </div>
        </div>
        <div class="ph-actions">
          <a class="btn btn-ghost" href="https://www.amazon.com/dp/${p.asin}" target="_blank" rel="noopener">View on Amazon</a>
        </div>
      </div>

      ${notesHtml}

      <!-- Tabs -->
      <div id="tabs">
        <div class="tab-nav">
          <button class="tab-btn" data-tab="listing">Listing Content</button>
          <button class="tab-btn" data-tab="media">Media</button>
          <button class="tab-btn" data-tab="pricing">Pricing &amp; Costs</button>
          <button class="tab-btn" data-tab="performance">Performance</button>
          <button class="tab-btn" data-tab="status">Status</button>
        </div>

        <!-- LISTING -->
        <div data-tab-panel="listing">
          ${listingPanel(p)}
        </div>

        <!-- MEDIA -->
        <div data-tab-panel="media">
          ${mediaPanel(p)}
        </div>

        <!-- PRICING -->
        <div data-tab-panel="pricing">
          ${pricingPanel(p, c)}
        </div>

        <!-- PERFORMANCE -->
        <div data-tab-panel="performance">
          ${performancePanel(p)}
        </div>

        <!-- STATUS -->
        <div data-tab-panel="status">
          ${statusPanel(p)}
        </div>
      </div>
    `;

    initTabs('#tabs');
    wireListing(p);
    wirePricing(p);
    wirePerformance(p);
    wireStatus(p);
  }

  /* ============ LISTING PANEL ============ */
  function listingPanel(p) {
    const L = p.listing || {};
    const field = (key, label, rows) => `
      <div class="field-row">
        <div class="field-label">
          <span>${label}</span>
          <span class="copy-link" data-copy="listing.${key}">Copy</span>
        </div>
        <textarea class="form-input" data-listing="${key}" rows="${rows || 2}">${escapeHtml(L[key] || '')}</textarea>
      </div>
    `;
    return `
      <div class="card">
        ${field('title', 'Title', 3)}
        ${field('bullet_1', 'Bullet 1', 2)}
        ${field('bullet_2', 'Bullet 2', 2)}
        ${field('bullet_3', 'Bullet 3', 2)}
        ${field('bullet_4', 'Bullet 4', 2)}
        ${field('bullet_5', 'Bullet 5', 2)}
        ${field('backend_keywords', 'Backend Search Terms (max 250 bytes)', 3)}
        ${field('product_description', 'Product Description', 5)}
        <div class="flex-between mt-12">
          <span class="tiny" id="listing-status">Loaded.</span>
          <div>
            <button class="btn btn-ghost" id="btn-listing-reset">Reset to JSON</button>
            <button class="btn btn-primary" id="btn-listing-save">Save</button>
          </div>
        </div>
      </div>
    `;
  }
  function wireListing(p) {
    const root = document.querySelector('[data-tab-panel="listing"]');
    if (!root) return;
    root.querySelectorAll('[data-copy]').forEach(el => {
      el.addEventListener('click', () => {
        const path = el.dataset.copy;
        const ta = root.querySelector(`[data-listing="${path.split('.')[1]}"]`);
        copyToClipboard(ta ? ta.value : '');
      });
    });
    document.getElementById('btn-listing-save').addEventListener('click', () => {
      const updates = {};
      root.querySelectorAll('[data-listing]').forEach(ta => {
        updates['listing.' + ta.dataset.listing] = ta.value;
      });
      saveOverrides(p.asin, updates);
      document.getElementById('listing-status').textContent = 'Saved at ' + new Date().toLocaleTimeString();
      toast('Listing saved', 'success');
    });
    document.getElementById('btn-listing-reset').addEventListener('click', () => {
      if (!confirm('Discard your local edits for this product? This clears all overrides on this ASIN.')) return;
      clearProductOverrides(p.asin);
      location.reload();
    });
  }

  /* ============ MEDIA PANEL ============ */
  // Produce an <img> tag for a given slot that tries every candidate folder/file
  // combo in order, then falls back to the first DHG reference image, then to a
  // placeholder.  Uses a JSON-encoded data attribute to drive an onerror chain.
  function slotImgTag(p, slot, alt, extraStyle) {
    const M = p.media || {};
    const candidates = (M._slot_candidates && M._slot_candidates[slot]) || [];
    // For non-MAIN slots, also let MAIN reference images serve as a last resort.
    const refs = M._ref_images || [];
    const refForSlot = (slot === 'MAIN') ? refs[0] : null;
    const all = candidates.slice();
    if (refForSlot) all.push(refForSlot);
    if (!all.length) {
      return placeholderDiv(slot, alt, extraStyle);
    }
    const first = all[0];
    const rest  = all.slice(1);
    const dataAttr = rest.length ? ` data-fallbacks='${escapeHtml(JSON.stringify(rest))}'` : '';
    const onerr = rest.length ? ' onerror="imgFallback(this)"' : ' onerror="imgPlaceholder(this)"';
    const style = extraStyle ? ` style="${extraStyle}"` : '';
    return `<img src="${escapeHtml(first)}" alt="${escapeHtml(alt || '')}"${style}${dataAttr}${onerr} loading="lazy">`;
  }
  function placeholderDiv(slot, alt, extraStyle) {
    return `<div class="img-placeholder" style="${extraStyle || ''};display:flex;align-items:center;justify-content:center;background:#f3f4f6;color:#9ca3af;font-size:11px;min-height:80px">${escapeHtml(slot || 'no image')}</div>`;
  }
  function mediaPanel(p) {
    const M = p.media || {};
    const slots = ['MAIN','PT01','PT02','PT03','PT04','PT05','PT06','PT07','PT08'];
    const heroSlot = 'MAIN';
    const thumbSlots = slots.filter(s => s !== heroSlot);
    return `
      <div class="card">
        <h3 style="font-size:14px;color:var(--green);margin-bottom:10px">Main Image (MAIN)</h3>
        <div style="max-width:420px;border:1px solid var(--border);border-radius:5px;overflow:hidden">
          ${slotImgTag(p, heroSlot, p.description, 'width:100%;display:block')}
        </div>
      </div>

      <div class="card mt-20" style="margin-top:18px">
        <h3 style="font-size:14px;color:var(--green);margin-bottom:10px">9-Slot Gallery</h3>
        <div class="gallery-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px">
          ${thumbSlots.map(s => `
            <div class="gallery-item" style="border:1px solid var(--border);border-radius:5px;overflow:hidden;position:relative">
              ${slotImgTag(p, s, s, 'width:100%;display:block;height:120px;object-fit:cover')}
              <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;font-size:10px;padding:2px 4px;text-align:center;font-family:monospace">${s}</div>
            </div>
          `).join('')}
        </div>
        <div class="tiny mt-12">Images load from <code>../listings/images/{tlaps_sku|asin|dhg_sku}/{ASIN}.{SLOT}.jpg</code>. Missing slots fall back to the DHG reference image or a placeholder.</div>
      </div>

      ${(M._ref_images && M._ref_images.length) ? `
      <div class="card mt-20" style="margin-top:18px">
        <h3 style="font-size:14px;color:var(--green);margin-bottom:10px">DHG Reference Images (source of truth)</h3>
        <div class="gallery-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px">
          ${M._ref_images.map(url => `
            <div class="gallery-item" style="border:1px solid var(--border);border-radius:5px;overflow:hidden">
              <img src="${escapeHtml(url)}" alt="DHG reference" loading="lazy" style="width:100%;display:block;height:120px;object-fit:cover">
            </div>
          `).join('')}
        </div>
        <div class="tiny mt-12">Pulled from DHG's live Amazon listing. Used by Higgsfield as the product fidelity anchor.</div>
      </div>
      ` : ''}

      <div class="card mt-20" style="margin-top:18px">
        <h3 style="font-size:14px;color:var(--green);margin-bottom:10px">Video</h3>
        <div class="flex-between mb-12">
          <div>${videoBadge(M.video_status)}</div>
          <div class="tiny mono">${escapeHtml(M.video || '(not in repo)')}</div>
        </div>
        ${M.video
          ? `<video controls style="max-width:100%;border-radius:5px"><source src="${escapeHtml(M.video)}"></video>`
          : '<div class="muted tiny">No local video file. Track upload status only.</div>'}
      </div>

      <div class="card mt-20" style="margin-top:18px">
        <h3 style="font-size:14px;color:var(--green);margin-bottom:10px">A+ Content</h3>
        <div class="mb-12">${aplusBadge(M.aplus_status)}</div>
        ${M.aplus_html
          ? `<iframe srcdoc="${escapeHtml(M.aplus_html)}" style="width:100%;height:480px;border:1px solid var(--border);border-radius:5px"></iframe>`
          : '<div class="muted tiny">No A+ HTML stored. Paste your A+ module HTML into the JSON or future editor.</div>'}
      </div>
    `;
  }

  /* ============ PRICING PANEL ============ */
  function pricingPanel(p, c) {
    return `
      <div class="card">
        <h3 style="font-size:14px;color:var(--green);margin-bottom:14px">Inputs</h3>
        <div class="pricing-grid">
          <div class="kpi">
            <div class="label">MAP Price</div>
            <div class="value">$<input type="number" step="0.01" class="calc-input" id="in-map" value="${p.map_price ?? ''}" style="width:100%;font-size:18px;font-weight:700;border:none;background:transparent;color:var(--text)"></div>
          </div>
          <div class="kpi">
            <div class="label">Amazon Selling</div>
            <div class="value">$<input type="number" step="0.01" class="calc-input" id="in-asp" value="${p.amazon_selling_price ?? ''}" style="width:100%;font-size:18px;font-weight:700;border:none;background:transparent;color:var(--text)"></div>
          </div>
          <div class="kpi ${p.dhg_cost_confirmed ? '' : 'unconfirmed'}">
            <div class="label">DHG Cost ${p.dhg_cost_confirmed ? '(confirmed)' : '(NOT confirmed)'}</div>
            <div class="value">$<input type="number" step="0.01" class="calc-input" id="in-dhg" value="${p.dhg_cost ?? ''}" style="width:100%;font-size:18px;font-weight:700;border:none;background:transparent;color:var(--text)"></div>
          </div>
          <div class="kpi">
            <div class="label">Coop Rate</div>
            <div class="value">${(p.coop_rate * 100).toFixed(0)}%</div>
          </div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="in-confirmed" ${p.dhg_cost_confirmed ? 'checked' : ''} style="accent-color:var(--green);width:16px;height:16px">
          DHG cost confirmed by Raymond
        </label>
      </div>

      <div class="card mt-20" style="margin-top:18px">
        <h3 style="font-size:14px;color:var(--green);margin-bottom:14px">Calculated Per-Unit P&amp;L</h3>
        <div class="pricing-grid" id="calc-grid">
          <div class="kpi"><
